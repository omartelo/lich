name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # linux and windows build in parallel; release fans in and publishes.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # git describe needs the tag history for the package version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # The binary is pure Go (CGO_ENABLED=0) — no C toolchain, no system
      # libraries. Packaging needs nfpm only.
      #
      # GOTOOLCHAIN=auto only here: setup-go exports `local`, which is right for
      # building lich (it holds every go command to the go.mod line) but breaks
      # installing these tools, since `@latest` resolves to releases that ask for
      # a newer Go than we declare. Scoped to the step because setup-go writes
      # `local` through GITHUB_ENV, which outranks a workflow-level env.
      - name: Install task and nfpm
        env:
          GOTOOLCHAIN: auto
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Frontend first: the backend embeds frontend/dist (go:embed), so Go
      # tests only compile once the frontend has been built.
      - name: Frontend install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # Both suites emit pass/fail counts + coverage into the job summary and
      # still fail the job on a red test (shared with ci.yml).
      - name: Frontend tests
        run: bash .github/scripts/web-test-summary.sh

      - name: Backend tests
        run: bash .github/scripts/go-test-summary.sh linux

      - name: Build Linux packages
        run: task package

      - name: Assemble Linux assets
        run: |
          cd bin
          # workflow_dispatch runs land here with a branch name; slashes would
          # break the file names.
          tag="${GITHUB_REF_NAME//\//-}"
          mv "lich.deb"             "lich-${tag}-amd64.deb"
          mv "lich.rpm"             "lich-${tag}-x86_64.rpm"
          mv "lich.pkg.tar.zst"     "lich-${tag}-x86_64.pkg.tar.zst"
          cp lich "lich-${tag}-linux-amd64"
          ls -la lich-${tag}-*

      - name: Upload Linux assets
        uses: actions/upload-artifact@v7
        with:
          name: lich-linux
          path: bin/lich-*

  windows:
    runs-on: windows-latest
    defaults:
      run:
        # bash (git-bash) keeps the steps byte-identical to the linux job's.
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # GOTOOLCHAIN=auto for the tool install only — see the linux job.
      - name: Install task and Inno Setup
        env:
          GOTOOLCHAIN: auto
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          choco install innosetup -y --no-progress

      # package:windows chains the whole build (frontend install+build, exe,
      # installer) — and the frontend build is what go:embed needs before the
      # backend suite can even compile, hence build first, tests right after.
      # Frontend tests already gate the linux job; running them twice buys
      # nothing.
      - name: Build Windows binary + installer
        run: task package:windows

      - name: Backend tests (windows)
        run: bash .github/scripts/go-test-summary.sh windows

      - name: Assemble Windows assets
        run: |
          cd bin
          tag="${GITHUB_REF_NAME//\//-}"
          mv lich.exe       "lich-${tag}-windows-amd64.exe"
          mv lich-setup.exe "lich-${tag}-windows-amd64-setup.exe"
          ls -la lich-${tag}-*

      - name: Upload Windows assets
        uses: actions/upload-artifact@v7
        with:
          name: lich-windows
          path: bin/lich-*

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # GOTOOLCHAIN=auto for the tool install only — see the linux job.
      - name: Install task
        env:
          GOTOOLCHAIN: auto
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # dist must exist before the backend suite (go:embed). macOS is Unix, so
      # this runs the real PTY tests on Apple Silicon; frontend tests already
      # gate the linux job.
      - name: Frontend install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Backend tests (macos)
        run: bash .github/scripts/go-test-summary.sh macos

      - name: Build macOS binaries
        run: task build:mac

      - name: Assemble macOS assets
        run: |
          cd bin
          tag="${GITHUB_REF_NAME//\//-}"
          mv lich-darwin-arm64 "lich-${tag}-darwin-arm64"
          mv lich-darwin-amd64 "lich-${tag}-darwin-amd64"
          ls -la lich-${tag}-*

      - name: Upload macOS assets
        uses: actions/upload-artifact@v7
        with:
          name: lich-macos
          path: bin/lich-*

  release:
    needs: [linux, windows, mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Checkout only for CHANGELOG.md — the notes come from it.
      - uses: actions/checkout@v7

      - name: Download build assets
        uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: Checksums
        run: |
          cd bin
          sha256sum lich-* > checksums.txt
          cat checksums.txt

      - name: Extract changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > notes.md
          fi
          cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            bin/lich-* bin/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md

  # The AUR PKGBUILD sources point at the GitHub Release assets, so this runs
  # only after `release` publishes them. updpkgsums fills the checksums by
  # downloading those assets; the action then regenerates .SRCINFO and pushes
  # to the lich-bin AUR repo over SSH.
  aur:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Render PKGBUILD
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed "s/@VERSION@/${version}/" build/linux/aur/PKGBUILD.tpl > PKGBUILD

      - name: Publish lich-bin to the AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.2.0
        with:
          pkgname: lich-bin
          pkgbuild: ./PKGBUILD
          updpkgsums: true
          commit_username: omartelo
          commit_email: meopedevts@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
