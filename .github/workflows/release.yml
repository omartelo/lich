name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # git describe needs the tag history for the package version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # The binary is pure Go (CGO_ENABLED=0) — no C toolchain, no system
      # libraries. Packaging needs nfpm only.
      - name: Install task and nfpm
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Frontend first: the backend embeds frontend/dist (go:embed), so Go
      # tests only compile once the frontend has been built.
      - name: Frontend install + tests + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Backend tests
        run: go test ./...

      - name: Build Linux packages
        run: task package

      - name: Assemble release assets
        run: |
          cd bin
          tag="${GITHUB_REF_NAME}"
          mv "lich.deb"             "lich-${tag}-amd64.deb"
          mv "lich.rpm"             "lich-${tag}-x86_64.rpm"
          mv "lich.pkg.tar.zst"     "lich-${tag}-x86_64.pkg.tar.zst"
          cp lich "lich-${tag}-linux-amd64"
          sha256sum lich-${tag}-* > checksums.txt
          cat checksums.txt

      - name: Extract changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > notes.md
          fi
          cat notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            bin/lich-${GITHUB_REF_NAME}-* bin/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lich-linux-packages
          path: |
            bin/*.deb
            bin/*.rpm
            bin/*.pkg.tar.zst
            bin/lich
            bin/checksums.txt
